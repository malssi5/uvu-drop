<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>UVU — DROP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F2ED;
  --off-white: #FAF8F5;
  --black: #0A0A0A;
  --mid: #888;
  --light: #C8C4BE;
  --border: #E0DDD8;
  --sans: 'Montserrat', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--off-white);
  color: var(--black);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  padding-bottom: 130px;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
header {
  padding: 24px 24px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.ticket-block { text-align: right; }
.ticket-label {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--mid);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.ticket-num {
  font-size: 26px;
  font-weight: 300;
  color: var(--black);
  letter-spacing: 2px;
  line-height: 1;
}
#ticketInput {
  width: 64px;
  font-family: var(--sans);
  font-size: 26px;
  font-weight: 300;
  color: var(--black);
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--black);
  text-align: right;
  outline: none;
  padding: 0;
  line-height: 1;
  display: none;
}
#ticketInput::placeholder { color: var(--border); }

/* STATUS BAR */
.status-bar {
  padding: 10px 24px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid);
  border-bottom: 1px solid var(--border);
  background: var(--cream);
  transition: color 0.3s, border-color 0.3s;
}
.status-bar.confirmed { color: var(--black); border-bottom-color: var(--black); }
.status-bar.picking   { color: var(--black); }

/* KAKAO BANNER */
.kakao-banner {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  background: var(--off-white);
}
.kakao-banner:active { background: var(--cream); }
.kakao-dot { width: 8px; height: 8px; background: var(--black); border-radius: 50%; flex-shrink: 0; }
.kakao-text { flex: 1; }
.kakao-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--black); margin-bottom: 3px; }
.kakao-sub  { font-size: 10px; color: var(--mid); line-height: 1.5; }
.kakao-arrow { font-size: 16px; color: var(--light); }

/* SOLDOUT BANNER */
.soldout-banner {
  display: none;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--cream);
}
.soldout-title { font-size: 11px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: var(--black); margin-bottom: 8px; }
.soldout-sub   { font-size: 10px; letter-spacing: 1px; color: var(--mid); margin-bottom: 16px; line-height: 1.6; text-transform: uppercase; }
.soldout-btn {
  display: inline-block;
  padding: 10px 20px;
  border: 1px solid var(--black);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  font-weight: 400;
}
.soldout-btn:active { background: var(--black); color: var(--off-white); }

/* DROP HEADER */
.drop-header {
  padding: 28px 24px 16px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
.drop-title { font-size: 11px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: var(--black); }
.drop-date  { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); }

/* PRODUCT CARD */
.product-card {
  padding: 0 0 24px;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}
.product-img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  display: block;
  background: var(--cream);
  margin-bottom: 16px;
}
.product-img-placeholder {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--cream);
  margin-bottom: 16px;
}
.product-info { padding: 0 24px; }
.product-name { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; font-weight: 400; margin-bottom: 4px; }
.product-sku  { font-size: 9px; letter-spacing: 1px; color: var(--light); margin-bottom: 12px; }
.product-limit { font-size: 9px; letter-spacing: 1px; color: var(--mid); margin-bottom: 14px; }
.product-limit.at-limit { color: #C4184A; }

.size-row { display: flex; gap: 8px; flex-wrap: wrap; }
.size-btn {
  min-width: 48px;
  height: 40px;
  padding: 0 12px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--mid);
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.size-btn:active:not(:disabled) { background: var(--cream); }
.size-btn.selected { background: var(--black); border-color: var(--black); color: var(--off-white); }
.size-btn:disabled { color: var(--border); border-color: var(--border); cursor: not-allowed; }
.size-btn:disabled::after {
  content: '';
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 1px;
  background: var(--border);
}
.qty-ctrl {
  display: inline-flex;
  align-items: center;
  gap: 0;
  border: 1px solid var(--black);
  height: 40px;
}
.qty-btn {
  width: 36px;
  height: 100%;
  background: transparent;
  border: none;
  color: var(--black);
  font-size: 16px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.qty-btn:active:not(:disabled) { background: var(--cream); }
.qty-btn:disabled { color: var(--light); cursor: not-allowed; }
.qty-num {
  padding: 0 10px;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--black);
  white-space: nowrap;
  font-weight: 400;
}

/* LOADING */
.loading {
  padding: 60px 24px;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--light);
  text-align: center;
}

/* CART */
.cart-section { padding: 28px 24px 0; }
.cart-label   { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); margin-bottom: 16px; }
.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.cart-item-name { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.cart-item-sub  { font-size: 9px; letter-spacing: 1px; color: var(--mid); }
.remove-btn { background: none; border: none; color: var(--light); cursor: pointer; font-size: 18px; padding: 4px 8px; }
.remove-btn:active { color: var(--black); }
.empty-cart { font-size: 10px; letter-spacing: 2px; color: var(--light); text-transform: uppercase; padding: 20px 0; }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--off-white);
  border-top: 1px solid var(--border);
  padding: 16px 24px 32px;
}
.save-btn {
  width: 100%;
  padding: 16px;
  background: var(--black);
  color: var(--off-white);
  border: none;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
}
.save-btn:active  { opacity: 0.8; }
.save-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.saved-note { text-align: center; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); margin-top: 10px; }

/* COMPLETE */
.complete-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 85vh;
  padding: 40px 32px;
  text-align: center;
}
.complete-rule { width: 40px; height: 1px; background: var(--black); margin-bottom: 32px; }
.complete-title { font-size: 36px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: var(--black); margin-bottom: 16px; }
.complete-sub   { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--mid); line-height: 2.4; margin-bottom: 48px; }
.complete-kakao { width: 100%; max-width: 280px; border-top: 1px solid var(--border); padding-top: 28px; }
.complete-kakao-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); margin-bottom: 16px; line-height: 2; }
.complete-kakao-btn {
  display: block; width: 100%; padding: 14px;
  border: 1px solid var(--black);
  font-family: var(--sans); font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--black); text-decoration: none; font-weight: 400;
}
.complete-kakao-btn:active { background: var(--black); color: var(--off-white); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 140px; left: 50%;
  transform: translateX(-50%);
  background: var(--black);
  color: var(--off-white);
  padding: 10px 24px;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  opacity: 0; transition: opacity 0.25s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- MAIN -->
<div id="mainView">

  <header>
    <div class="logo">
      <img id="logoImg" alt="UVU" style="height:28px; display:block;">
    </div>
    <div class="ticket-block">
      <div class="ticket-label">Entry No.</div>
      <div class="ticket-num" id="ticketDisplay"></div>
      <input id="ticketInput" type="number" inputmode="numeric" placeholder="—">
    </div>
  </header>

  <div class="status-bar" id="statusBar">Awaiting entry confirmation</div>

  <a class="kakao-banner" href="http://pf.kakao.com/_YwyMX" target="_blank">
    <div class="kakao-dot"></div>
    <div class="kakao-text">
      <div class="kakao-title">Next Drop — Be First</div>
      <div class="kakao-sub">채널 추가 시 드롭 48시간 전 선공개</div>
    </div>
    <div class="kakao-arrow">›</div>
  </a>

  <div class="soldout-banner" id="soldoutBanner">
    <div class="soldout-title">Missed your size?</div>
    <div class="soldout-sub">다음 드롭 알림을 채널에서 가장 먼저 받으세요</div>
    <a class="soldout-btn" href="http://pf.kakao.com/_YwyMX" target="_blank">카카오 채널 추가</a>
  </div>

  <div id="productList" class="loading">Loading</div>

  <div class="cart-section">
    <div class="cart-label">Selected</div>
    <div id="cartList"><div class="empty-cart">Nothing selected</div></div>
  </div>

</div>

<!-- COMPLETE -->
<div class="complete-screen" id="completeView">
  <div class="complete-rule"></div>
  <div class="complete-title">Thank you.</div>
  <div class="complete-sub">오늘도 달려주셔서 감사합니다<br>You vs You</div>
  <div class="complete-kakao">
    <div class="complete-kakao-label">다음 드롭도<br>놓치지 마세요</div>
    <a class="complete-kakao-btn" href="http://pf.kakao.com/_YwyMX" target="_blank">카카오 채널 추가</a>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar">
  <button class="save-btn" id="saveBtn" onclick="saveCart()">Save Selection</button>
  <div class="saved-note" id="savedNote"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbx8DAIb67nogTSaRoBQCWKqvfbLkIt8Y2kPpJ-qkXFiPHUQpH8pmR3VZP5JL57hwA/exec';
const MAX_QTY_PER_SKU = 2; // 제품당 최대 수량

// ── 상태 ─────────────────────────────────────────────
let ticketNo = new URLSearchParams(location.search).get('t') || '';
let inventory = [];
let cart = {}; // { 'SKU-사이즈': { sku, name, size } }
let statusInterval = null;
let pendingSave = false;

// ── 초기화 ────────────────────────────────────────────
(function initTicket() {
  const display = document.getElementById('ticketDisplay');
  const input   = document.getElementById('ticketInput');
  if (ticketNo) {
    display.textContent = ticketNo;
  } else {
    input.style.display = 'block';
  }
})();

async function init() {
  // 로고 base64 주입 (별도 파일 요청 없이 인라인)
  loadInventory();
  if (ticketNo) startPolling();
}

// ── 번호 입력 ─────────────────────────────────────────
function applyTicket(val) {
  const n = parseInt(val, 10);
  if (!n || n <= 0) return;
  ticketNo = String(n);

  const display = document.getElementById('ticketDisplay');
  const input   = document.getElementById('ticketInput');
  display.textContent = ticketNo;
  input.style.display = 'none';

  startPolling();
  if (pendingSave) { pendingSave = false; saveCart(); }
}

document.getElementById('ticketInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); applyTicket(this.value); this.blur(); }
});
document.getElementById('ticketInput').addEventListener('blur', function() {
  applyTicket(this.value);
});

// ── 재고 로드 ─────────────────────────────────────────
async function loadInventory() {
  try {
    const res = await api({ action: 'getInventory' });
    inventory = res.items || [];
    renderProducts();
  } catch(e) {
    document.getElementById('productList').innerHTML = '<div class="loading">재고 확인 실패 — 새로고침해주세요</div>';
  }
}

// ── 상태 폴링 ─────────────────────────────────────────
function startPolling() {
  checkStatus();
  if (!statusInterval) statusInterval = setInterval(checkStatus, 8000);
}

async function checkStatus() {
  if (!ticketNo) return;
  try {
    const res = await api({ action: 'getOrder', ticketNo: String(ticketNo) });
    updateStatusBar(res.status);
    if (res.status === '결제완료') showComplete();
  } catch(e) {}
}

function updateStatusBar(status) {
  const msgs = {
    '찜':       { text: 'Selection saved — awaiting staff confirmation', cls: '' },
    '확정':     { text: 'Confirmed — preparing your items', cls: 'confirmed' },
    '피킹완료': { text: 'Ready — please proceed to cashier', cls: 'picking' },
    '결제완료': { text: 'Complete', cls: '' },
  };
  const m = msgs[status] || { text: 'Awaiting entry confirmation', cls: '' };
  const bar = document.getElementById('statusBar');
  bar.textContent = m.text;
  bar.className = 'status-bar ' + m.cls;
}

// ── 제품 렌더링 ───────────────────────────────────────
function renderProducts() {
  // SKU별 그루핑
  const grouped = {};
  inventory.forEach(item => {
    const sku = item['SKU'];
    if (!grouped[sku]) {
      grouped[sku] = { sku, name: item['제품명'], imgUrl: item['이미지URL'] || '', sizes: [] };
    }
    grouped[sku].sizes.push({
      size: item['사이즈'],
      avail: (item['초기수량'] || 0) - (item['예약수량'] || 0) - (item['판매수량'] || 0)
    });
  });

  const container = document.getElementById('productList');
  const skus = Object.values(grouped);

  if (skus.length === 0) {
    container.innerHTML = '<div class="loading">No items available</div>';
    return;
  }

  const today = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  container.innerHTML =
    `<div class="drop-header">
       <div class="drop-title">Today's Drop</div>
       <div class="drop-date">${today}</div>
     </div>` +
    skus.map(p => {
      const cartQty = Object.keys(cart).filter(k => k.startsWith(p.sku + '-')).length;
      const atLimit = cartQty >= MAX_QTY_PER_SKU;
      const limitText = atLimit
        ? `Max ${MAX_QTY_PER_SKU} per item reached`
        : `Max ${MAX_QTY_PER_SKU} per item`;

      return `
        <div class="product-card">
          ${p.imgUrl
            ? `<img class="product-img" src="${p.imgUrl}" alt="${p.name}" loading="lazy">`
            : `<div class="product-img-placeholder"></div>`}
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-sku">${p.sku}</div>
            <div class="product-limit${atLimit ? ' at-limit' : ''}">${limitText}</div>
            <div class="size-row">
              ${p.sizes.map(s => {
                const key = p.sku + '-' + s.size;
                const qty      = cart[key] ? cart[key].qty : 0;
                const soldout  = s.avail <= 0;
                const blocked  = atLimit && qty === 0;
                if (qty > 0) {
                  // 수량 표시 + +/- 버튼
                  return `<div class="qty-ctrl">
                    <button class="qty-btn" onclick="removeSize('${p.sku}','${s.size}')">−</button>
                    <span class="qty-num">${s.size} × ${qty}</span>
                    <button class="qty-btn" onclick="addSize('${p.sku}','${p.name}','${s.size}')" ${atLimit ? 'disabled' : ''}>+</button>
                  </div>`;
                }
                return `<button
                  class="size-btn"
                  ${soldout || blocked ? 'disabled' : ''}
                  onclick="addSize('${p.sku}','${p.name}','${s.size}')"
                >${s.size}</button>`;
              }).join('')}
            </div>
          </div>
        </div>`;
    }).join('');

  // 품절 배너 (전체 사이즈 중 50% 이상 소진)
  const total   = inventory.length;
  const soldout = inventory.filter(i => (i['초기수량']||0) - (i['예약수량']||0) - (i['판매수량']||0) <= 0).length;
  if (total > 0 && soldout / total >= 0.5) {
    document.getElementById('soldoutBanner').style.display = 'block';
  }
}

// ── 수량 조절 ─────────────────────────────────────────
function getSkuQty(sku) {
  return Object.values(cart)
    .filter(i => i.sku === sku)
    .reduce((sum, i) => sum + i.qty, 0);
}

function addSize(sku, name, size) {
  const key = sku + '-' + size;
  const skuQty = getSkuQty(sku);
  if (skuQty >= MAX_QTY_PER_SKU) {
    showToast(`품목당 최대 ${MAX_QTY_PER_SKU}개까지 가능합니다`);
    return;
  }
  if (cart[key]) {
    cart[key].qty += 1;
  } else {
    cart[key] = { sku, name, size, qty: 1 };
  }
  renderProducts();
  renderCart();
}

function removeSize(sku, size) {
  const key = sku + '-' + size;
  if (!cart[key]) return;
  cart[key].qty -= 1;
  if (cart[key].qty <= 0) delete cart[key];
  renderProducts();
  renderCart();
}

// ── 장바구니 렌더링 ───────────────────────────────────
function renderCart() {
  const items = Object.values(cart);
  const el = document.getElementById('cartList');
  if (items.length === 0) {
    el.innerHTML = '<div class="empty-cart">Nothing selected</div>';
    return;
  }
  el.innerHTML = items.map(i => `
    <div class="cart-item">
      <div>
        <div class="cart-item-name">${i.name} ${i.qty > 1 ? `× ${i.qty}` : ''}</div>
        <div class="cart-item-sub">${i.sku} &nbsp;/&nbsp; ${i.size}</div>
      </div>
      <button class="remove-btn" onclick="removeItem('${i.sku}-${i.size}')">×</button>
    </div>`).join('');
}

function removeItem(key) {
  delete cart[key]; // 장바구니에서 전체 삭제
  renderProducts();
  renderCart();
}

// ── 찜 저장 ───────────────────────────────────────────
async function saveCart() {
  const items = Object.values(cart);
  if (items.length === 0) { showToast('먼저 제품을 선택해주세요'); return; }

  if (!ticketNo) {
    pendingSave = true;
    showToast('입장 번호를 먼저 입력해주세요');
    document.getElementById('ticketInput').style.display = 'block';
    document.getElementById('ticketDisplay').textContent = '';
    document.getElementById('ticketInput').focus();
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    // qty만큼 펼쳐서 전송 (Apps Script가 행 단위로 처리하므로)
    const expandedItems = [];
    items.forEach(i => {
      for (let q = 0; q < i.qty; q++) {
        expandedItems.push({ sku: i.sku, name: i.name, size: i.size });
      }
    });
    await api({ action: 'addToCart', ticketNo: String(ticketNo), items: expandedItems });
    document.getElementById('savedNote').textContent = 'Awaiting staff confirmation';
    updateStatusBar('찜');
    showToast('저장됐어요');
    startPolling();
  } catch(e) {
    showToast('저장 실패 — 다시 시도해주세요');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Selection';
  }
}

// ── 결제완료 화면 ─────────────────────────────────────
function showComplete() {
  clearInterval(statusInterval);
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('bottomBar').style.display = 'none';
  document.getElementById('completeView').style.display = 'flex';
}

// ── API ───────────────────────────────────────────────
async function api(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' }, // Apps Script CORS 호환
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── 토스트 ────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
