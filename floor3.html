<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UVU — 3층 피킹</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --accent: #e8e0d0;
    --muted: #484f58;
    --text: #f0ece4;
    --blue: #388bfd;
    --green: #3fb950;
    --yellow: #d29922;
    --mono: 'DM Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: var(--display);
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .floor-badge {
    font-size: 11px;
    color: var(--blue);
    letter-spacing: 2px;
  }

  .last-update {
    font-size: 10px;
    color: var(--muted);
  }

  .summary-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .summary-item {
    flex: 1;
    padding: 12px;
    text-align: center;
    border-right: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .summary-item:last-child { border-right: none; }
  .summary-num {
    font-family: var(--display);
    font-size: 28px;
    display: block;
    margin-bottom: 2px;
  }

  .summary-num.blue   { color: var(--blue); }
  .summary-num.yellow { color: var(--yellow); }
  .summary-num.green  { color: var(--green); }

  .orders-container {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    transition: border-color 0.2s;
  }

  .order-card.urgent { border-left: 3px solid var(--yellow); }

  .order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .ticket-num {
    font-family: var(--display);
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .wait-time {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }

  .wait-time.long { color: var(--yellow); }

  .item-list {
    margin-bottom: 14px;
  }

  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .item-row:last-child { border-bottom: none; }

  .item-name { color: var(--accent); }
  .item-detail {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .item-size {
    background: var(--border);
    color: var(--text);
    padding: 3px 8px;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .pick-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--blue);
    color: var(--blue);
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .pick-btn:hover {
    background: var(--blue);
    color: var(--bg);
  }

  .pick-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* 재고 사이드바 토글 */
  .inventory-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .inventory-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .inventory-panel {
    display: none;
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 280px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    z-index: 100;
    padding: 20px;
  }

  .inventory-panel.open { display: block; }

  .inv-header {
    font-family: var(--display);
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
  }

  .close-inv {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
  }

  .inv-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }

  .inv-name { color: var(--accent); margin-bottom: 6px; }

  .inv-sizes {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .inv-size {
    padding: 3px 8px;
    border: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 1px;
  }

  .inv-size.low  { border-color: var(--yellow); color: var(--yellow); }
  .inv-size.out  { border-color: var(--muted); color: var(--muted); text-decoration: line-through; }
  .inv-size.ok   { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo">UVU</div>
  <div class="floor-badge">3F PICKING</div>
  <div class="last-update" id="lastUpdate">—</div>
</header>

<div class="summary-bar">
  <div class="summary-item">
    <span class="summary-num blue" id="countPending">0</span>
    대기
  </div>
  <div class="summary-item">
    <span class="summary-num yellow" id="countUrgent">0</span>
    5분 초과
  </div>
  <div class="summary-item">
    <span class="summary-num green" id="countDone">0</span>
    오늘 완료
  </div>
</div>

<div class="orders-container" id="ordersContainer">
  <div class="empty-state">
    <div class="empty-icon">📦</div>
    확정된 주문이 없습니다
  </div>
</div>

<button class="inventory-toggle" onclick="toggleInventory()">재고 현황</button>

<div class="inventory-panel" id="inventoryPanel">
  <div class="inv-header">
    재고
    <button class="close-inv" onclick="toggleInventory()">×</button>
  </div>
  <div id="inventoryList">로딩 중...</div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbx8DAIb67nogTSaRoBQCWKqvfbLkIt8Y2kPpJ-qkXFiPHUQpH8pmR3VZP5JL57hwA/exec';

  let doneCount = 0;
  let orderTimestamps = {};

  async function load() {
    try {
      const res = await api({ action: 'getPendingOrders' });
      renderOrders(res.orders || []);
      document.getElementById('lastUpdate').textContent =
        '갱신 ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch(e) {}
  }

  function renderOrders(orders) {
    const container = document.getElementById('ordersContainer');
    const now = Date.now();

    if (orders.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div>확정된 주문이 없습니다</div>`;
      document.getElementById('countPending').textContent = 0;
      document.getElementById('countUrgent').textContent = 0;
      return;
    }

    // 타임스탬프 등록
    orders.forEach(o => {
      if (!orderTimestamps[o.ticketNo]) orderTimestamps[o.ticketNo] = now;
    });

    let urgentCount = 0;

    container.innerHTML = orders.map(order => {
      const elapsed = Math.floor((now - (orderTimestamps[order.ticketNo] || now)) / 1000 / 60);
      const isUrgent = elapsed >= 5;
      if (isUrgent) urgentCount++;

      return `
        <div class="order-card ${isUrgent ? 'urgent' : ''}">
          <div class="order-header">
            <div class="ticket-num">NO.${order.ticketNo}</div>
            <div class="wait-time ${isUrgent ? 'long' : ''}">
              ${elapsed > 0 ? elapsed + '분 전 확정' : '방금 확정'}
            </div>
          </div>
          <div class="item-list">
            ${order.items.map(item => `
              <div class="item-row">
                <div>
                  <div class="item-name">${item.name}</div>
                  <div class="item-detail">${item.sku}</div>
                </div>
                <div class="item-size">${item.size}</div>
              </div>
            `).join('')}
          </div>
          <button class="pick-btn" onclick="completePicking('${order.ticketNo}', this)">
            피킹 완료
          </button>
        </div>
      `;
    }).join('');

    document.getElementById('countPending').textContent = orders.length;
    document.getElementById('countUrgent').textContent = urgentCount;
    document.getElementById('countDone').textContent = doneCount;
  }

  async function completePicking(ticketNo, btn) {
    btn.disabled = true;
    btn.textContent = '처리 중...';
    try {
      await api({ action: 'completePicking', ticketNo });
      delete orderTimestamps[ticketNo];
      doneCount++;
      load();
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '피킹 완료';
    }
  }

  async function toggleInventory() {
    const panel = document.getElementById('inventoryPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      await loadInventory();
    }
  }

  async function loadInventory() {
    const res = await api({ action: 'getInventory' });
    const grouped = {};
    res.items.forEach(item => {
      if (!grouped[item['SKU']]) grouped[item['SKU']] = { name: item['제품명'], sizes: [] };
      const avail = (item['초기수량'] || 0) - (item['예약수량'] || 0) - (item['판매수량'] || 0);
      grouped[item['SKU']].sizes.push({ size: item['사이즈'], avail });
    });

    document.getElementById('inventoryList').innerHTML = Object.entries(grouped).map(([sku, p]) => `
      <div class="inv-item">
        <div class="inv-name">${p.name}</div>
        <div class="inv-sizes">
          ${p.sizes.map(s => {
            const cls = s.avail <= 0 ? 'out' : s.avail <= 2 ? 'low' : 'ok';
            return `<div class="inv-size ${cls}">${s.size} (${s.avail})</div>`;
          }).join('')}
        </div>
      </div>
    `).join('');
  }

  async function api(body) {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(body) });
    return res.json();
  }

  load();
  setInterval(load, 6000);
</script>
</body>
</html>
