<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UVU — 3F PICKING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F2ED;
  --off-white: #FAF8F5;
  --black: #0A0A0A;
  --mid: #888;
  --light: #C8C4BE;
  --border: #E0DDD8;
  --pink: #C4184A;
  --sans: 'Montserrat', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--off-white);
  color: var(--black);
  font-family: var(--sans);
  font-weight: 500;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--off-white);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { height: 22px; display: block; }
.floor-badge {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--mid);
  padding-left: 16px;
  border-left: 1px solid var(--border);
}
.last-update { font-size: 12px; letter-spacing: 1px; color: var(--light); }

/* SUMMARY BAR */
.summary-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--cream);
}
.summary-item {
  flex: 1;
  padding: 16px 12px;
  text-align: center;
  border-right: 1px solid var(--border);
}
.summary-item:last-child { border-right: none; }
.summary-label {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 6px;
}
.summary-num {
  font-size: 34px;
  font-weight: 500;
  color: var(--black);
  line-height: 1;
}
.summary-num.urgent { color: var(--pink); }
.summary-num.done   { color: var(--mid); }

/* ORDERS GRID */
.orders-container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

/* ORDER CARD */
.order-card {
  border: 1px solid var(--border);
  background: var(--off-white);
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.order-card.urgent { border-left: 2px solid var(--pink); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}

.order-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.ticket-num {
  font-size: 30px;
  font-weight: 500;
  letter-spacing: 3px;
  color: var(--black);
}
.wait-time {
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--light);
}
.wait-time.urgent { color: var(--pink); }

/* ITEM LIST */
.item-list { margin-bottom: 16px; }
.item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.item-row:last-child { border-bottom: none; }
.item-name {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--black);
  margin-bottom: 3px;
}
.item-sku { font-size: 12px; letter-spacing: 1px; color: var(--light); }
.item-size {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--black);
  border: 1px solid var(--border);
  padding: 4px 10px;
}

/* PICK BUTTON */
.pick-btn {
  width: 100%;
  padding: 14px;
  background: var(--black);
  border: none;
  color: var(--off-white);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
}
.pick-btn:active  { opacity: 0.8; }
.pick-btn:disabled { opacity: 0.2; cursor: not-allowed; }

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 100px 20px;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--light);
}

/* INVENTORY TOGGLE */
.inventory-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--black);
  border: none;
  color: var(--off-white);
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 20px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.inventory-toggle:active { opacity: 0.8; }

/* INVENTORY PANEL */
.inventory-panel {
  display: none;
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 260px;
  background: var(--cream);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  z-index: 100;
  padding: 24px 20px;
}
.inventory-panel.open { display: block; }

.inv-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.inv-title { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); }
.close-inv { background: none; border: none; color: var(--light); cursor: pointer; font-size: 22px; font-weight: 500; }

.inv-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.inv-name { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; color: var(--black); margin-bottom: 10px; }
.inv-sizes { display: flex; flex-wrap: wrap; gap: 6px; }
.inv-size {
  padding: 4px 8px;
  border: 1px solid var(--border);
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--mid);
}
.inv-size.low { border-color: var(--pink); color: var(--pink); }
.inv-size.out { color: var(--border); text-decoration: line-through; }
.inv-size.ok  { border-color: var(--black); color: var(--black); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img class="logo" alt="UVU" id="logoImg">
    <div class="floor-badge">3F Picking</div>
  </div>
  <div class="last-update" id="lastUpdate">—</div>
</header>

<div class="summary-bar">
  <div class="summary-item">
    <div class="summary-label">대기</div>
    <div class="summary-num" id="countPending">0</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">5분 초과</div>
    <div class="summary-num urgent" id="countUrgent">0</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">오늘 완료</div>
    <div class="summary-num done" id="countDone">0</div>
  </div>
</div>

<div class="orders-container" id="ordersContainer">
  <div class="empty-state">확정된 주문이 없습니다</div>
</div>

<button class="inventory-toggle" onclick="toggleInventory()">재고 현황</button>

<div class="inventory-panel" id="inventoryPanel">
  <div class="inv-header">
    <div class="inv-title">Inventory</div>
    <button class="close-inv" onclick="toggleInventory()">×</button>
  </div>
  <div id="inventoryList">
    <div style="font-size:9px;letter-spacing:2px;color:var(--light);text-transform:uppercase">Loading</div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzHIVtTAmbu1U9SsENEXuWPDAy2CP55nzcTW3cWFismVX1V63qrNpJ97GMAJJt-A4oB/exec';

let orderTimestamps = {};

async function load() {
  try {
    const res = await api({ action: 'getPendingOrders' });
    renderOrders(res.orders || [], res.todayDoneCount || 0);
    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch(e) {}
}

function renderOrders(orders, todayDoneCount) {
  const container = document.getElementById('ordersContainer');
  const now = Date.now();

  if (orders.length === 0) {
    container.innerHTML = '<div class="empty-state">확정된 주문이 없습니다</div>';
    document.getElementById('countPending').textContent = 0;
    document.getElementById('countUrgent').textContent = 0;
    document.getElementById('countDone').textContent = todayDoneCount;
    return;
  }

  orders.forEach(o => {
    if (!orderTimestamps[o.ticketNo]) orderTimestamps[o.ticketNo] = now;
  });

  let urgentCount = 0;

  container.innerHTML = orders.map(order => {
    const elapsed = Math.floor((now - (orderTimestamps[order.ticketNo] || now)) / 60000);
    const isUrgent = elapsed >= 5;
    if (isUrgent) urgentCount++;

    return `
      <div class="order-card${isUrgent ? ' urgent' : ''}">
        <div class="order-header">
          <div class="ticket-num">No.${order.ticketNo}</div>
          <div class="wait-time${isUrgent ? ' urgent' : ''}">
            ${elapsed > 0 ? elapsed + '분 전' : '방금'}
          </div>
        </div>
        <div class="item-list">
          ${order.items.map(item => `
            <div class="item-row">
              <div>
                <div class="item-name">${item.name}</div>
                <div class="item-sku">${item.sku}</div>
              </div>
              <div class="item-size">${item.size}</div>
            </div>`).join('')}
        </div>
        <button class="pick-btn" onclick="completePicking('${order.ticketNo}', this)">
          Picking Complete
        </button>
      </div>`;
  }).join('');

  document.getElementById('countPending').textContent = orders.length;
  document.getElementById('countUrgent').textContent = urgentCount;
  document.getElementById('countDone').textContent = todayDoneCount;
}

async function completePicking(ticketNo, btn) {
  btn.disabled = true;
  btn.textContent = 'Processing...';
  try {
    await api({ action: 'completePicking', ticketNo: String(ticketNo) });
    delete orderTimestamps[ticketNo];
    load();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Picking Complete';
  }
}

async function toggleInventory() {
  const panel = document.getElementById('inventoryPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) loadInventory();
}

async function loadInventory() {
  try {
    const res = await api({ action: 'getInventory' });
    const grouped = {};
    res.items.forEach(item => {
      const sku = item['SKU'];
      if (!grouped[sku]) grouped[sku] = { name: item['제품명'], sizes: [] };
      const avail = (item['초기수량']||0) - (item['예약수량']||0) - (item['판매수량']||0);
      grouped[sku].sizes.push({ size: item['사이즈'], avail });
    });

    document.getElementById('inventoryList').innerHTML = Object.values(grouped).map(p => `
      <div class="inv-item">
        <div class="inv-name">${p.name}</div>
        <div class="inv-sizes">
          ${p.sizes.map(s => {
            const cls = s.avail <= 0 ? 'out' : s.avail <= 2 ? 'low' : 'ok';
            return `<div class="inv-size ${cls}">${s.size} (${s.avail})</div>`;
          }).join('')}
        </div>
      </div>`).join('');
  } catch(e) {}
}

async function api(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return res.json();
}

load();
setInterval(load, 6000);
</script>
