<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UVU — 3F PICKING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root {
  --cream: #F5F2ED; --off-white: #FAF8F5; --black: #0A0A0A;
  --mid: #888; --light: #C8C4BE; --border: #E0DDD8;
  --pink: #C4184A; --sans: 'Montserrat', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--off-white); color: var(--black);
  font-family: var(--sans); font-weight: 500;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

.pin-screen {
  position: fixed; inset: 0;
  background: var(--off-white);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 16px;
}
.pin-screen img { height: 24px; margin-bottom: 8px; }
.pin-screen-label {
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--mid);
}
.pin-input {
  font-size: 30px; font-weight: 500;
  width: 110px; text-align: center;
  border: none; border-bottom: 1px solid var(--black);
  background: transparent; outline: none;
  letter-spacing: 8px; font-family: var(--sans);
  padding: 4px 0;
}
.pin-error {
  font-size: 10px; letter-spacing: 2px;
  color: var(--pink); text-transform: uppercase;
  opacity: 0; transition: opacity 0.2s;
}

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  background: var(--off-white); position: sticky; top: 0; z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { height: 22px; display: block; }
.floor-badge {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--mid); padding-left: 16px; border-left: 1px solid var(--border); font-weight: 600;
}
.last-update { font-size: 11px; letter-spacing: 1px; color: var(--light); font-weight: 500; }

.summary-bar {
  display: flex; border-bottom: 1px solid var(--border); background: var(--cream);
}
.summary-item {
  flex: 1; padding: 16px 12px; text-align: center;
  border-right: 1px solid var(--border);
}
.summary-item:last-child { border-right: none; }
.summary-label {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--mid); margin-bottom: 6px; font-weight: 600;
}
.summary-num {
  font-size: 34px; font-weight: 600; color: var(--black); line-height: 1;
}
.summary-num.urgent { color: var(--pink); }
.summary-num.done   { color: var(--mid); }

.orders-container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.order-card {
  border: 1px solid var(--border); background: var(--off-white);
  padding: 20px; animation: fadeIn 0.2s ease;
}
.order-card.urgent { border-left: 2px solid var(--pink); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}

.order-header {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.ticket-num {
  font-size: 30px; font-weight: 600; letter-spacing: 3px; color: var(--black);
}
.wait-time {
  font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--light); font-weight: 600;
}
.wait-time.urgent { color: var(--pink); }

.item-list { margin-bottom: 16px; }
.item-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.item-row:last-child { border-bottom: none; }
.item-name {
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  font-weight: 600; color: var(--black); margin-bottom: 3px;
}
.item-sku { font-size: 11px; letter-spacing: 1px; color: var(--light); font-weight: 500; }
.item-size {
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  color: var(--black); border: 1px solid var(--border); padding: 4px 10px;
}

.pick-btn {
  width: 100%; padding: 16px;
  background: var(--black); border: none;
  color: var(--off-white); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 4px;
  text-transform: uppercase; cursor: pointer;
  transition: opacity 0.15s;
}
.pick-btn:active  { opacity: 0.8; }
.pick-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.empty-state {
  grid-column: 1 / -1; text-align: center;
  padding: 100px 20px; font-size: 12px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--light); font-weight: 600;
}

.inventory-toggle {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--black); border: none;
  color: var(--off-white); font-family: var(--sans);
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  padding: 14px 22px; cursor: pointer;
  transition: opacity 0.15s; font-weight: 600;
}
.inventory-toggle:active { opacity: 0.8; }

.inventory-panel {
  display: none; position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 280px; background: var(--cream);
  border-left: 1px solid var(--border);
  overflow-y: auto; z-index: 100;
  padding: 24px 20px;
}
.inventory-panel.open { display: block; }

.inv-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.inv-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); font-weight: 600; }
.close-inv { background: none; border: none; color: var(--light); cursor: pointer; font-size: 22px; font-weight: 300; }

.inv-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.inv-name { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
.inv-sizes { display: flex; flex-wrap: wrap; gap: 6px; }
.inv-size {
  padding: 5px 10px; border: 1px solid var(--border);
  font-size: 11px; letter-spacing: 1px; color: var(--mid); font-weight: 600;
}
.inv-size.low { border-color: var(--pink); color: var(--pink); }
.inv-size.out { color: var(--border); text-decoration: line-through; }
.inv-size.ok  { border-color: var(--black); color: var(--black); }
</style>
</head>
<body>

<!-- PIN 화면 -->
<div id="pinScreen" class="pin-screen">
  <img id="pinLogo" alt="UVU">
  <div class="pin-screen-label">Staff Access</div>
  <input id="pinInput" class="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="— — — —">
  <div id="pinError" class="pin-error">Incorrect PIN</div>
</div>

<header>
  <div class="header-left">
    <img class="logo" alt="UVU" src="image/uvu_logo_pink.png">
    <div class="floor-badge">3F Picking</div>
  </div>
  <div class="last-update" id="lastUpdate">—</div>
</header>

<div class="summary-bar">
  <div class="summary-item">
    <div class="summary-label">대기</div>
    <div class="summary-num" id="countPending">0</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">5분 초과</div>
    <div class="summary-num urgent" id="countUrgent">0</div>
  </div>
  <div class="summary-item">
    <div class="summary-label">오늘 완료</div>
    <div class="summary-num done" id="countDone">0</div>
  </div>
</div>

<div class="orders-container" id="ordersContainer">
  <div class="empty-state">확정된 주문이 없습니다</div>
</div>

<button class="cleanup-btn" data-action="cleanup-stale-cart"
  style="
    position: fixed;
    bottom: 24px;
    right: 180px;
    background: transparent;
    border: 1px solid var(--mid);
    color: var(--mid);
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 20px;
    cursor: pointer;
    transition: opacity 0.15s;
    font-weight: 600;
  ">
  찜 정리
</button>
<button class="inventory-toggle" data-action="toggle-inventory">재고 현황</button>

<div class="inventory-panel" id="inventoryPanel">
  <div class="inv-header">
    <div class="inv-title">Inventory</div>
    <button class="close-inv" data-action="toggle-inventory">×</button>
  </div>
  <div id="inventoryList">
    <div style="font-size:11px;letter-spacing:2px;color:var(--light);text-transform:uppercase;font-weight:600">Loading</div>
  </div>
</div>

<script>
// ==========================================================
// ⚠️ 본인 값으로 교체 필요
// ==========================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzHIVtTAmbu1U9SsENEXuWPDAy2CP55nzcTW3cWFismVX1V63qrNpJ97GMAJJt-A4oB/exec';
const STAFF_PIN = '1012'; // 실제 운영 전 변경

const firebaseConfig = {
  apiKey: "AIzaSyDM4_fiLNZ-3-AeI1rjU1eC1hMbGK4FlUY",
  authDomain: "uvu-drop.firebaseapp.com",
  databaseURL: "https://uvu-drop-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "uvu-drop",
  storageBucket: "uvu-drop.firebasestorage.app",
  messagingSenderId: "26429048916",
  appId: "1:26429048916:web:575d46c0a30b477df2c5c1"
};
// ==========================================================

const PIN_TTL_HOURS = 8;
let orderTimestamps = {};

const HTML_ESCAPE_MAP = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => HTML_ESCAPE_MAP[ch]);
}

// PIN 세션 체크
function checkPinSession() {
  const saved = localStorage.getItem('uvu_pin_auth');
  if (!saved) return false;
  try {
    const { expiresAt } = JSON.parse(saved);
    if (Date.now() < expiresAt) return true;
  } catch(e) {}
  localStorage.removeItem('uvu_pin_auth');
  return false;
}

function savePinSession() {
  const expiresAt = Date.now() + PIN_TTL_HOURS * 60 * 60 * 1000;
  localStorage.setItem('uvu_pin_auth', JSON.stringify({ expiresAt }));
}

document.getElementById('pinInput').addEventListener('input', function() {
  if (this.value.length === 4) {
    if (this.value === STAFF_PIN) {
      savePinSession();
      document.getElementById('pinScreen').style.display = 'none';
      init();
    } else {
      document.getElementById('pinError').style.opacity = '1';
      this.value = '';
      setTimeout(() => {
        document.getElementById('pinError').style.opacity = '0';
      }, 1500);
    }
  }
});

if (checkPinSession()) {
  document.getElementById('pinScreen').style.display = 'none';
  init();
}

function init() {
  // Firebase 실시간 구독
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  db.ref('orders').on('value', () => load());

  // 초기 로드 + 백업 폴링
  load();
  setInterval(load, 10000);
}

async function load() {
  try {
    const res = await api({ action: 'getPendingOrders' });
    renderOrders(res.orders || [], res.todayDoneCount || 0);
    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch(e) {}
}

function renderOrders(orders, todayDoneCount) {
  const container = document.getElementById('ordersContainer');
  const now = Date.now();

  if (orders.length === 0) {
    container.innerHTML = '<div class="empty-state">확정된 주문이 없습니다</div>';
    document.getElementById('countPending').textContent = 0;
    document.getElementById('countUrgent').textContent = 0;
    document.getElementById('countDone').textContent = todayDoneCount;
    return;
  }

  orders.forEach(o => {
    if (!orderTimestamps[o.ticketNo]) orderTimestamps[o.ticketNo] = now;
  });

  let urgentCount = 0;

  container.innerHTML = orders.map(order => {
    const elapsed = Math.floor((now - (orderTimestamps[order.ticketNo] || now)) / 60000);
    const isUrgent = elapsed >= 5;
    if (isUrgent) urgentCount++;

    return `
      <div class="order-card${isUrgent ? ' urgent' : ''}">
        <div class="order-header">
          <div class="ticket-num">No.${escapeHtml(order.ticketNo)}</div>
          <div class="wait-time${isUrgent ? ' urgent' : ''}">
            ${elapsed > 0 ? elapsed + '분 전' : '방금'}
          </div>
        </div>
        <div class="item-list">
          ${order.items.map(item => `
            <div class="item-row">
              <div>
                <div class="item-name">${escapeHtml(item.name)}</div>
                <div class="item-sku">${escapeHtml(item.sku)} × ${item.qty || 1}</div>
              </div>
              <div class="item-size">${escapeHtml(item.size)}</div>
            </div>`).join('')}
        </div>
        <button class="pick-btn" data-action="complete-picking" data-ticket="${escapeHtml(order.ticketNo)}">
          Picking Complete
        </button>
      </div>`;
  }).join('');

  document.getElementById('countPending').textContent = orders.length;
  document.getElementById('countUrgent').textContent = urgentCount;
  document.getElementById('countDone').textContent = todayDoneCount;
}

async function completePicking(ticketNo, btn) {
  btn.disabled = true;
  btn.textContent = 'Processing...';
  try {
    await api({ action: 'completePicking', ticketNo });
    delete orderTimestamps[ticketNo];
    load();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Picking Complete';
  }
}

async function cleanupStaleCart() {
  if (!confirm('2시간 이상 지난 미확정 찜을 삭제할까요?\n(매장 밖에서 저장만 하고 오지 않은 주문)')) return;
  
  try {
    const res = await api({ action: 'cleanupStaleCart' });
    if (res.success) {
      alert(`${res.cleaned}개의 미확정 찜이 정리되었습니다`);
      load();
    } else {
      alert('정리 실패');
    }
  } catch(e) {
    alert('정리 실패');
  }
}
  
async function toggleInventory() {
  const panel = document.getElementById('inventoryPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) loadInventory();
}

async function loadInventory() {
  try {
    const res = await api({ action: 'getInventory' });
    const grouped = {};
    res.items.forEach(item => {
      const sku = item['SKU'];
      if (!grouped[sku]) grouped[sku] = { name: item['제품명'], sizes: [] };
      const avail = (item['초기수량']||0) - (item['예약수량']||0) - (item['판매수량']||0);
      grouped[sku].sizes.push({ size: item['사이즈'], avail });
    });

    document.getElementById('inventoryList').innerHTML = Object.values(grouped).map(p => `
      <div class="inv-item">
        <div class="inv-name">${escapeHtml(p.name)}</div>
        <div class="inv-sizes">
          ${p.sizes.map(s => {
            const cls = s.avail <= 0 ? 'out' : s.avail <= 2 ? 'low' : 'ok';
            return `<div class="inv-size ${cls}">${escapeHtml(s.size)} (${s.avail})</div>`;
          }).join('')}
        </div>
      </div>`).join('');
  } catch(e) {}
}

async function api(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return res.json();
}

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el || el.disabled) return;
  const { action, ticket } = el.dataset;
  switch (action) {
    case 'complete-picking': completePicking(ticket, el); break;
    case 'cleanup-stale-cart': cleanupStaleCart(); break;
    case 'toggle-inventory': toggleInventory(); break;
  }
});
</script>

<script>
const logoUrl = 'image/uvu_logo_pink.png';
document.getElementById('logoImg').src = logoUrl;
document.getElementById('pinLogo').src = logoUrl;
</script>
</body>
</html>
