<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UVU Drop</title>
<title>UVU — CASHIER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --cream: #F5F2ED; --off-white: #FAF8F5; --black: #0A0A0A;
  --mid: #888; --light: #C8C4BE; --border: #E0DDD8;
  --pink: #C4184A; --sans: 'Montserrat', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--off-white); color: var(--black);
  font-family: var(--sans); font-weight: 500;
  min-height: 100vh; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* PIN 화면 */
.pin-screen {
  position: fixed; inset: 0;
  background: var(--off-white);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 16px;
}
.pin-screen img { height: 24px; margin-bottom: 8px; }
.pin-screen-label {
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--mid);
}
.pin-input {
  font-size: 30px; font-weight: 500;
  width: 110px; text-align: center;
  border: none; border-bottom: 1px solid var(--black);
  background: transparent; outline: none;
  letter-spacing: 8px; font-family: var(--sans);
  padding: 4px 0;
}
.pin-error {
  font-size: 10px; letter-spacing: 2px;
  color: var(--pink); text-transform: uppercase;
  opacity: 0; transition: opacity 0.2s;
}

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  background: var(--off-white);
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { height: 22px; display: block; }
.cashier-badge {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--mid); padding-left: 16px; border-left: 1px solid var(--border); font-weight: 600;
}
.last-update { font-size: 11px; letter-spacing: 1px; color: var(--light); font-weight: 500; }

.tabs {
  display: flex; border-bottom: 1px solid var(--border); background: var(--cream);
}
.tab {
  flex: 1; padding: 14px; text-align: center;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--light); cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: all 0.15s; margin-bottom: -1px; font-weight: 600;
}
.tab.active { color: var(--black); border-bottom-color: var(--black); }

.section { padding: 20px 24px; flex: 1; }

.reset-btn {
  width: 100%; padding: 14px;
  background: transparent; border: 1px solid var(--pink);
  color: var(--pink); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer;
  margin-bottom: 20px; transition: all 0.15s;
}
.reset-btn:active { background: var(--pink); color: var(--off-white); }

/* QR 스캐너 */
#qrReader {
  width: 100%; max-width: 400px;
  margin: 0 auto 16px;
}
.scan-btn {
  width: 100%; padding: 18px;
  background: var(--black); border: none;
  color: var(--off-white); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 4px;
  text-transform: uppercase; cursor: pointer;
  margin-bottom: 20px; transition: opacity 0.15s;
}
.scan-btn:active { opacity: 0.8; }

/* 프리뷰 카드 */
.preview-card {
  border: 1px solid var(--border); padding: 20px;
  margin-bottom: 12px; background: var(--off-white);
}
.preview-header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.preview-ticket-num {
  font-size: 22px; font-weight: 600; letter-spacing: 3px; color: var(--black);
}
.preview-status {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--mid); font-weight: 600;
}
.preview-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.preview-item:last-of-type { border-bottom: none; }
.preview-name { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 3px; }
.preview-sku  { font-size: 10px; letter-spacing: 1px; color: var(--light); font-weight: 500; }
.preview-size {
  font-size: 12px; letter-spacing: 1px;
  border: 1px solid var(--border); padding: 4px 10px;
  color: var(--black); font-weight: 600;
}

.action-row { display: flex; gap: 8px; margin-top: 16px; }
.action-btn {
  flex: 1; padding: 14px;
  background: transparent; border: 1px solid var(--border);
  color: var(--mid); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer;
  transition: all 0.15s;
}
.action-btn:active { background: var(--cream); }
.action-btn.primary { border-color: var(--black); color: var(--black); }
.action-btn.primary:active { background: var(--black); color: var(--off-white); }

/* 찜 목록 */
.cart-list-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--mid); margin-bottom: 16px; font-weight: 600;
}

/* 결제 대기 */
.ready-card {
  display: flex; gap: 20px; align-items: center;
  border: 1px solid var(--border); border-left: 2px solid var(--black);
  padding: 16px 20px; margin-bottom: 10px;
  background: var(--off-white);
}
.ready-ticket-num {
  font-size: 30px; font-weight: 600; letter-spacing: 3px;
  color: var(--black); min-width: 80px;
}
.ready-items { flex: 1; }
.ready-item-row {
  display: flex; justify-content: space-between;
  padding: 5px 0; border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.ready-item-row:last-child { border-bottom: none; }
.ready-item-name { letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
.ready-item-size { color: var(--mid); letter-spacing: 1px; font-weight: 600; }

.pay-btn {
  padding: 14px 18px; background: var(--black); border: none;
  color: var(--off-white); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer;
  transition: opacity 0.15s; white-space: nowrap;
  line-height: 1.8; text-align: center;
}
.pay-btn:active  { opacity: 0.8; }
.pay-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.empty-state {
  text-align: center; padding: 60px 20px;
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--light); font-weight: 600;
}

/* 토스트 */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  background: var(--black); color: var(--off-white);
  padding: 12px 24px;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  opacity: 0; transition: opacity 0.25s;
  pointer-events: none; z-index: 999;
  white-space: nowrap; font-weight: 600;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- PIN 화면 -->
<div id="pinScreen" class="pin-screen">
  <img id="pinLogo" alt="UVU">
  <div class="pin-screen-label">Staff Access</div>
  <input id="pinInput" class="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="— — — —">
  <div id="pinError" class="pin-error">Incorrect PIN</div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div class="header-left">
    <img class="logo" alt="UVU" id="logoImg">
    <div class="cashier-badge">Cashier</div>
  </div>
  <div class="last-update" id="lastUpdate">—</div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-scan" onclick="switchTab('scan')">QR 스캔</div>
  <div class="tab" id="tab-carts" onclick="switchTab('carts')">찜 목록</div>
  <div class="tab" id="tab-payment" onclick="switchTab('payment')">결제 대기</div>
</div>

<!-- QR 스캔 탭 -->
<div id="view-scan" class="section">
  <button class="reset-btn" onclick="resetDrop()">드롭 초기화</button>
  <div id="qrReader"></div>
  <button class="scan-btn" id="scanBtn" onclick="startScanner()">QR 스캐너 시작</button>
  <div id="previewArea"></div>
</div>

<!-- 찜 목록 탭 -->
<div id="view-carts" class="section" style="display:none">
  <div class="cart-list-label">대기 중인 찜</div>
  <div id="cartList"><div class="empty-state">대기 중인 찜이 없습니다</div></div>
</div>

<!-- 결제 대기 탭 -->
<div id="view-payment" class="section" style="display:none">
  <div id="readyList"><div class="empty-state">결제 대기 주문이 없습니다</div></div>
</div>

<script>
// ==========================================================
// ⚠️ 본인 값으로 교체 필요
// ==========================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzHIVtTAmbu1U9SsENEXuWPDAy2CP55nzcTW3cWFismVX1V63qrNpJ97GMAJJt-A4oB/exec';
const STAFF_PIN = '1012'; // 실제 운영 전 변경
// ==========================================================

const PIN_TTL_HOURS = 8;
let currentTab = 'scan';
let html5QrCode = null;

// PIN 세션 체크
function checkPinSession() {
  const saved = localStorage.getItem('uvu_pin_auth');
  if (!saved) return false;
  try {
    const { expiresAt } = JSON.parse(saved);
    if (Date.now() < expiresAt) return true;
  } catch(e) {}
  localStorage.removeItem('uvu_pin_auth');
  return false;
}

function savePinSession() {
  const expiresAt = Date.now() + PIN_TTL_HOURS * 60 * 60 * 1000;
  localStorage.setItem('uvu_pin_auth', JSON.stringify({ expiresAt }));
}

// PIN 입력 처리
document.getElementById('pinInput').addEventListener('input', function() {
  if (this.value.length === 4) {
    if (this.value === STAFF_PIN) {
      savePinSession();
      document.getElementById('pinScreen').style.display = 'none';
      init();
    } else {
      document.getElementById('pinError').style.opacity = '1';
      this.value = '';
      setTimeout(() => {
        document.getElementById('pinError').style.opacity = '0';
      }, 1500);
    }
  }
});

if (checkPinSession()) {
  document.getElementById('pinScreen').style.display = 'none';
  init();
}

function init() {
  // 자동 갱신
  setInterval(() => {
    if (currentTab === 'carts') loadPendingCarts();
    if (currentTab === 'payment') loadReadyOrders();
    updateLastUpdate();
  }, 5000);
}

function switchTab(tab) {
  currentTab = tab;
  ['scan', 'carts', 'payment'].forEach(t => {
    document.getElementById('view-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).className = 'tab' + (t === tab ? ' active' : '');
  });

  if (tab === 'carts') loadPendingCarts();
  if (tab === 'payment') loadReadyOrders();

  // 스캔 탭 벗어나면 카메라 중지
  if (tab !== 'scan' && html5QrCode) {
    try { html5QrCode.stop(); } catch(e) {}
  }
}

function updateLastUpdate() {
  document.getElementById('lastUpdate').textContent =
    new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ── QR 스캐너 ─────────────────────────────────────────
function startScanner() {
  document.getElementById('scanBtn').style.display = 'none';
  document.getElementById('qrReader').style.display = 'block';

  html5QrCode = new Html5Qrcode('qrReader');
  html5QrCode.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 240 } },
    (sessionId) => {
      html5QrCode.stop().then(() => {
        document.getElementById('qrReader').style.display = 'none';
        document.getElementById('scanBtn').style.display = 'block';
        document.getElementById('scanBtn').textContent = 'QR 다시 스캔';
        loadCartBySession(sessionId);
      });
    },
    (error) => {}
  ).catch(err => {
    showToast('카메라 접근 실패');
    document.getElementById('scanBtn').style.display = 'block';
  });
}

async function loadCartBySession(sessionId) {
  const area = document.getElementById('previewArea');
  area.innerHTML = '<div class="empty-state">조회 중...</div>';

  try {
    const res = await api({ action: 'getOrder', sessionId });
    if (!res.items || res.items.length === 0) {
      area.innerHTML = '<div class="empty-state">찜 내역이 없습니다</div>';
      return;
    }
    renderPreview(res, sessionId);
  } catch(e) {
    area.innerHTML = '<div class="empty-state">조회 실패</div>';
  }
}

function renderPreview(data, sessionId) {
  const area = document.getElementById('previewArea');
  const statusMap = { '찜':'찜됨', '확정':'확정', '피킹완료':'피킹 완료', '결제완료':'결제 완료' };
  const isConfirmed = ['확정','피킹완료','결제완료'].includes(data.status);

  area.innerHTML = `
    <div class="preview-card">
      <div class="preview-header">
        <div class="preview-ticket-num">${data.ticketNo ? 'No.' + data.ticketNo : '찜 확인'}</div>
        <div class="preview-status">${statusMap[data.status] || ''}</div>
      </div>
      ${data.items.map(item => `
        <div class="preview-item">
          <div>
            <div class="preview-name">${item.name}</div>
            <div class="preview-sku">${item.sku} × ${item.qty || 1}</div>
          </div>
          <div class="preview-size">${item.size}</div>
        </div>`).join('')}
      <div class="action-row">
        ${!isConfirmed
          ? `<button class="action-btn primary" onclick="confirmBySession('${sessionId}', this)">확정</button>`
          : `<button class="action-btn" disabled>처리됨</button>`}
      </div>
    </div>`;
}

async function confirmBySession(sessionId, btn) {
  btn.disabled = true;
  btn.textContent = '처리 중...';
  try {
    const res = await api({ action: 'confirmOrder', sessionId });
    if (res.soldout) {
      const list = (res.items || []).map(i => `${i.name} ${i.size}`).join(', ');
      showToast(`품절: ${list}`);
      btn.disabled = false;
      btn.textContent = '확정';
      return;
    }
    if (res.success === false) {
      showToast(res.message || '확정 실패');
      btn.disabled = false;
      btn.textContent = '확정';
      return;
    }
    showToast('No.' + res.ticketNo + ' 확정 완료');
    document.getElementById('previewArea').innerHTML = '';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '확정';
    showToast('확정 실패');
  }
}

// ── 찜 목록 탭 ─────────────────────────────────────────
async function loadPendingCarts() {
  try {
    const res = await api({ action: 'getPendingCarts' });
    const carts = res.carts || [];
    const el = document.getElementById('cartList');

    if (carts.length === 0) {
      el.innerHTML = '<div class="empty-state">대기 중인 찜이 없습니다</div>';
      return;
    }

    el.innerHTML = carts.map(cart => `
      <div class="preview-card">
        <div class="preview-header">
          <div class="preview-ticket-num">찜 #${cart.sessionId.slice(-4)}</div>
          <div class="preview-status">${cart.items.length}개 선택</div>
        </div>
        ${cart.items.map(item => `
          <div class="preview-item">
            <div>
              <div class="preview-name">${item.name}</div>
              <div class="preview-sku">${item.sku} × ${item.qty || 1}</div>
            </div>
            <div class="preview-size">${item.size}</div>
          </div>`).join('')}
        <div class="action-row">
          <button class="action-btn primary" onclick="confirmBySession('${cart.sessionId}', this)">확정</button>
        </div>
      </div>`).join('');
  } catch(e) {}
}

// ── 결제 대기 탭 ───────────────────────────────────────
async function loadReadyOrders() {
  try {
    const res = await api({ action: 'getReadyOrders' });
    const orders = res.orders || [];
    const el = document.getElementById('readyList');

    if (orders.length === 0) {
      el.innerHTML = '<div class="empty-state">결제 대기 주문이 없습니다</div>';
      return;
    }

    el.innerHTML = orders.map(order => `
      <div class="ready-card">
        <div class="ready-ticket-num">No.${order.ticketNo}</div>
        <div class="ready-items">
          ${order.items.map(item => `
            <div class="ready-item-row">
              <span class="ready-item-name">${item.name} × ${item.qty || 1}</span>
              <span class="ready-item-size">${item.size}</span>
            </div>`).join('')}
        </div>
        <button class="pay-btn" onclick="completePayment('${order.ticketNo}', this)">결제<br>완료</button>
      </div>`).join('');
  } catch(e) {}
}

async function completePayment(ticketNo, btn) {
  btn.disabled = true;
  btn.textContent = '처리 중';
  try {
    await api({ action: 'completePayment', ticketNo });
    showToast('No.' + ticketNo + ' 결제 완료');
    loadReadyOrders();
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '결제<br>완료';
    showToast('처리 실패');
  }
}

// ── 드롭 초기화 ───────────────────────────────────────
async function resetDrop() {
  if (!confirm('드롭 초기화를 실행할까요?\n이전 주문이 아카이브되고 번호/재고가 리셋됩니다.')) return;
  try {
    const res = await api({ action: 'resetDrop' });
    if (res.success) {
      showToast('초기화 완료');
    } else {
      showToast('초기화 실패');
    }
  } catch(e) {
    showToast('초기화 실패');
  }
}

// ── 유틸 ──────────────────────────────────────────────
async function api(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return res.json();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>

<script>
const logoUrl = 'https://raw.githubusercontent.com/malssi5/uvu-drop/main/image/uvu_logo_pink.png';
document.getElementById('logoImg').src = logoUrl;
document.getElementById('pinLogo').src = logoUrl;
</script>
</body>
</html>
