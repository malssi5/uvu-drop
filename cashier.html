<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UVU — CASHIER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --cream: #F5F2ED; --off-white: #FAF8F5; --black: #0A0A0A;
  --mid: #888; --light: #C8C4BE; --border: #E0DDD8;
  --pink: #C4184A; --sans: 'Montserrat', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--off-white); color: var(--black);
  font-family: var(--sans); font-weight: 500;
  min-height: 100vh; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* PIN 화면 */
.pin-screen {
  position: fixed; inset: 0;
  background: var(--off-white);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 16px;
}
.pin-screen img { height: 24px; margin-bottom: 8px; }
.pin-screen-label {
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--mid);
}
.pin-input {
  font-size: 30px; font-weight: 500;
  width: 110px; text-align: center;
  border: none; border-bottom: 1px solid var(--black);
  background: transparent; outline: none;
  letter-spacing: 8px; font-family: var(--sans);
  padding: 4px 0;
}
.pin-error {
  font-size: 10px; letter-spacing: 2px;
  color: var(--pink); text-transform: uppercase;
  opacity: 0; transition: opacity 0.2s;
}

header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  background: var(--off-white);
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { height: 22px; display: block; }
.cashier-badge {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--mid); padding-left: 16px; border-left: 1px solid var(--border); font-weight: 600;
}
.last-update { font-size: 11px; letter-spacing: 1px; color: var(--light); font-weight: 500; }

.tabs {
  display: flex; border-bottom: 1px solid var(--border); background: var(--cream);
}
.tab {
  flex: 1; padding: 14px; text-align: center;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--light); cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: all 0.15s; margin-bottom: -1px; font-weight: 600;
}
.tab.active { color: var(--black); border-bottom-color: var(--black); }

.section { padding: 20px 24px; flex: 1; }

.reset-btn {
  width: 100%; padding: 14px;
  background: transparent; border: 1px solid var(--pink);
  color: var(--pink); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer;
  margin-bottom: 20px; transition: all 0.15s;
}
.reset-btn:active { background: var(--pink); color: var(--off-white); }

/* QR 스캐너 */
#qrReader {
  width: 100%; max-width: 400px;
  margin: 0 auto 16px;
}
.scan-btn {
  width: 100%; padding: 18px;
  background: var(--black); border: none;
  color: var(--off-white); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 4px;
  text-transform: uppercase; cursor: pointer;
  margin-bottom: 20px; transition: opacity 0.15s;
}
.scan-btn:active { opacity: 0.8; }

/* 프리뷰 카드 */
.preview-card {
  border: 1px solid var(--border); padding: 20px;
  margin-bottom: 12px; background: var(--off-white);
}
.preview-header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.preview-ticket-num {
  font-size: 22px; font-weight: 600; letter-spacing: 3px; color: var(--black);
}
.preview-status {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--mid); font-weight: 600;
}
.preview-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.preview-item:last-of-type { border-bottom: none; }
.preview-name { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 3px; }
.preview-sku  { font-size: 10px; letter-spacing: 1px; color: var(--light); font-weight: 500; }
.preview-size {
  font-size: 12px; letter-spacing: 1px;
  border: 1px solid var(--border); padding: 4px 10px;
  color: var(--black); font-weight: 600;
}

.action-row { display: flex; gap: 8px; margin-top: 16px; }
.action-btn {
  flex: 1; padding: 14px;
  background: transparent; border: 1px solid var(--border);
  color: var(--mid); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer;
  transition: all 0.15s;
}
.action-btn:active { background: var(--cream); }
.action-btn.primary { border-color: var(--black); color: var(--black); }
.action-btn.primary:active { background: var(--black); color: var(--off-white); }

/* 찜 목록 */
.cart-list-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--mid); margin-bottom: 16px; font-weight: 600;
}

/* 결제 대기 */
.ready-card {
  display: flex; gap: 20px; align-items: center;
  border: 1px solid var(--border); border-left: 2px solid var(--black);
  padding: 16px 20px; margin-bottom: 10px;
  background: var(--off-white);
}
.ready-ticket-num {
  font-size: 30px; font-weight: 600; letter-spacing: 3px;
  color: var(--black); min-width: 80px;
}
.ready-items { flex: 1; }
.ready-item-row {
  display: flex; justify-content: space-between;
  padding: 5px 0; border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.ready-item-row:last-child { border-bottom: none; }
.ready-item-name { letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
.ready-item-size { color: var(--mid); letter-spacing: 1px; font-weight: 600; }

.pay-btn {
  padding: 14px 18px; background: var(--black); border: none;
  color: var(--off-white); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer;
  transition: opacity 0.15s; white-space: nowrap;
  line-height: 1.8; text-align: center;
}
.pay-btn:active  { opacity: 0.8; }
.pay-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.empty-state {
  text-align: center; padding: 60px 20px;
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--light); font-weight: 600;
}

/* 토스트 */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  background: var(--black); color: var(--off-white);
  padding: 12px 24px;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  opacity: 0; transition: opacity 0.25s;
  pointer-events: none; z-index: 999;
  white-space: nowrap; font-weight: 600;
}
.toast.show { opacity: 1; }

/* ── 수정 모달 ─────────────────────────────────── */
.edit-modal {
  display: none;
  position: fixed; inset: 0;
  background: var(--off-white);
  z-index: 500;
  flex-direction: column;
  overflow: hidden;
}
.edit-modal.open { display: flex; }

.edit-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--off-white);
  flex-shrink: 0;
}
.edit-title {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--black); font-weight: 600;
}
.edit-title .ticket {
  font-size: 18px; letter-spacing: 2px; margin-left: 12px;
}
.edit-status-pill {
  display: inline-block; margin-left: 12px;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  border: 1px solid var(--border); padding: 3px 8px; color: var(--mid); font-weight: 600;
}
.edit-status-pill.picking { color: var(--pink); border-color: var(--pink); }
.edit-close {
  background: none; border: none; cursor: pointer;
  font-size: 24px; color: var(--mid); padding: 0 4px; line-height: 1;
}

.edit-body {
  flex: 1; overflow-y: auto;
  padding: 16px 24px 100px;
}

.edit-section-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--mid); margin: 16px 0 10px; font-weight: 600;
}

.edit-item {
  display: flex; gap: 12px; align-items: center;
  padding: 12px 14px; border: 1px solid var(--border);
  background: var(--off-white); margin-bottom: 6px;
}
.edit-item-info { flex: 1; min-width: 0; }
.edit-item-name { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 3px; }
.edit-item-sub  { font-size: 10px; letter-spacing: 1px; color: var(--mid); font-weight: 500; }
.edit-item-size {
  font-size: 11px; letter-spacing: 1px; font-weight: 600;
  border: 1px solid var(--border); padding: 4px 10px;
  background: var(--off-white);
}

.edit-qty-ctrl {
  display: inline-flex; align-items: center;
  border: 1px solid var(--black); height: 36px;
}
.edit-qty-btn {
  width: 32px; height: 100%;
  background: transparent; border: none;
  color: var(--black); font-size: 16px; font-weight: 400; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.edit-qty-btn:active:not(:disabled) { background: var(--cream); }
.edit-qty-btn:disabled { color: var(--light); cursor: not-allowed; }
.edit-qty-num {
  padding: 0 12px; font-size: 12px; font-weight: 600;
  letter-spacing: 1px; min-width: 24px; text-align: center;
}

.edit-remove-btn {
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--light); padding: 4px 8px; font-weight: 300;
}
.edit-remove-btn:active { color: var(--pink); }

.edit-empty {
  text-align: center; padding: 30px 16px;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--light); font-weight: 600;
  border: 1px dashed var(--border);
}

.add-toggle-btn {
  width: 100%; padding: 14px;
  background: transparent; border: 1px dashed var(--border);
  color: var(--mid); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer;
  margin-top: 4px;
}
.add-toggle-btn:active { background: var(--cream); }
.add-toggle-btn.active { border-style: solid; border-color: var(--black); color: var(--black); }

.add-grid {
  display: none;
  margin-top: 12px;
}
.add-grid.open { display: block; }

.add-product {
  border: 1px solid var(--border);
  background: var(--off-white);
  padding: 14px;
  margin-bottom: 10px;
}
.add-product-head {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.add-product-img {
  width: 48px; height: 48px; object-fit: contain;
  background: var(--cream); flex-shrink: 0;
}
.add-product-img-placeholder {
  width: 48px; height: 48px; background: var(--cream); flex-shrink: 0;
}
.add-product-meta { flex: 1; min-width: 0; }
.add-product-name { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin-bottom: 3px; }
.add-product-sub  { font-size: 10px; letter-spacing: 1px; color: var(--mid); }

.add-size-row { display: flex; flex-wrap: wrap; gap: 6px; }
.add-size-btn {
  min-width: 44px; height: 34px; padding: 0 10px;
  background: transparent; border: 1px solid var(--border);
  color: var(--black); font-family: var(--sans);
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  cursor: pointer; transition: all 0.15s;
  position: relative;
}
.add-size-btn:active:not(:disabled) { background: var(--cream); }
.add-size-btn:disabled { color: var(--border); border-color: var(--border); cursor: not-allowed; }
.add-size-btn:disabled::after {
  content: ''; position: absolute; top: 50%; left: 0; right: 0;
  height: 1px; background: var(--border);
}
.add-size-avail {
  display: inline-block; margin-left: 4px;
  font-size: 9px; color: var(--mid); font-weight: 500;
}

.edit-footer {
  position: absolute; left: 0; right: 0; bottom: 0;
  display: flex; gap: 8px;
  padding: 14px 24px 18px;
  background: var(--off-white);
  border-top: 1px solid var(--border);
}
.edit-cancel-btn, .edit-save-btn {
  flex: 1; padding: 14px;
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
  border: 1px solid var(--border);
}
.edit-cancel-btn {
  background: transparent; color: var(--mid);
}
.edit-cancel-btn:active { background: var(--cream); }
.edit-save-btn {
  background: var(--black); border-color: var(--black); color: var(--off-white);
}
.edit-save-btn:active { opacity: 0.8; }
.edit-save-btn:disabled { opacity: 0.25; cursor: not-allowed; }
</style>
</head>
<body>

<!-- PIN 화면 -->
<div id="pinScreen" class="pin-screen">
  <img id="pinLogo" alt="UVU">
  <div class="pin-screen-label">Staff Access</div>
  <input id="pinInput" class="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="— — — —">
  <div id="pinError" class="pin-error">Incorrect PIN</div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div class="header-left">
    <img class="logo" alt="UVU" id="logoImg">
    <div class="cashier-badge">Cashier</div>
  </div>
  <div class="last-update" id="lastUpdate">—</div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-scan" data-action="switch-tab" data-tab="scan">QR 스캔</div>
  <div class="tab" id="tab-carts" data-action="switch-tab" data-tab="carts">찜 목록</div>
  <div class="tab" id="tab-payment" data-action="switch-tab" data-tab="payment">결제 대기</div>
</div>

<!-- QR 스캔 탭 -->
<div id="view-scan" class="section">
  <button class="reset-btn" data-action="reset-drop">드롭 초기화</button>
  <div id="qrReader"></div>
  <button class="scan-btn" id="scanBtn" data-action="start-scanner">QR 스캐너 시작</button>
  <div id="previewArea"></div>
</div>

<!-- 찜 목록 탭 -->
<div id="view-carts" class="section" style="display:none">
  <div class="cart-list-label">대기 중인 찜</div>
  <div id="cartList"><div class="empty-state">대기 중인 찜이 없습니다</div></div>
</div>

<!-- 결제 대기 탭 -->
<div id="view-payment" class="section" style="display:none">
  <div id="readyList"><div class="empty-state">결제 대기 주문이 없습니다</div></div>
</div>

<!-- 주문 수정 모달 -->
<div class="edit-modal" id="editModal">
  <div class="edit-header">
    <div class="edit-title">
      Edit
      <span class="ticket" id="editTicketLabel">No.—</span>
      <span class="edit-status-pill" id="editStatusPill">—</span>
    </div>
    <button class="edit-close" data-action="edit-close" aria-label="닫기">×</button>
  </div>
  <div class="edit-body">
    <div class="edit-section-label">Items in Order</div>
    <div id="editItemsList"></div>

    <div class="edit-section-label" style="margin-top: 24px;">Add Item</div>
    <button class="add-toggle-btn" id="addToggleBtn" data-action="edit-toggle-add">+ 항목 추가</button>
    <div class="add-grid" id="addGrid"></div>
  </div>
  <div class="edit-footer">
    <button class="edit-cancel-btn" data-action="edit-close">취소</button>
    <button class="edit-save-btn" id="editSaveBtn" data-action="edit-save">변경 저장</button>
  </div>
</div>

<script>
// ==========================================================
// ⚠️ 본인 값으로 교체 필요
// ==========================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzHIVtTAmbu1U9SsENEXuWPDAy2CP55nzcTW3cWFismVX1V63qrNpJ97GMAJJt-A4oB/exec';
const STAFF_PIN = '1012'; // 실제 운영 전 변경
// ==========================================================

const PIN_TTL_HOURS = 8;
let currentTab = 'scan';
let html5QrCode = null;

// ── 수정 모달 state ─────────────────────────
let editingTicketNo = null;
let editingOldStatus = null;          // '확정' | '피킹완료'
let editItems = {};                   // key: sku|size → { sku, name, size, qty, price }
let editInventory = [];               // [{ SKU, 사이즈, 제품명, 가격, 이미지URL, _avail }]
let editAddPanelOpen = false;

const HTML_ESCAPE_MAP = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => HTML_ESCAPE_MAP[ch]);
}

// PIN 세션 체크
function checkPinSession() {
  const saved = localStorage.getItem('uvu_pin_auth');
  if (!saved) return false;
  try {
    const { expiresAt } = JSON.parse(saved);
    if (Date.now() < expiresAt) return true;
  } catch(e) {}
  localStorage.removeItem('uvu_pin_auth');
  return false;
}

function savePinSession() {
  const expiresAt = Date.now() + PIN_TTL_HOURS * 60 * 60 * 1000;
  localStorage.setItem('uvu_pin_auth', JSON.stringify({ expiresAt }));
}

// PIN 입력 처리
document.getElementById('pinInput').addEventListener('input', function() {
  if (this.value.length === 4) {
    if (this.value === STAFF_PIN) {
      savePinSession();
      document.getElementById('pinScreen').style.display = 'none';
      init();
    } else {
      document.getElementById('pinError').style.opacity = '1';
      this.value = '';
      setTimeout(() => {
        document.getElementById('pinError').style.opacity = '0';
      }, 1500);
    }
  }
});

if (checkPinSession()) {
  document.getElementById('pinScreen').style.display = 'none';
  init();
}

function init() {
  // 자동 갱신
  setInterval(() => {
    if (currentTab === 'carts') loadPendingCarts();
    if (currentTab === 'payment') loadReadyOrders();
    updateLastUpdate();
  }, 5000);
}

function switchTab(tab) {
  currentTab = tab;
  ['scan', 'carts', 'payment'].forEach(t => {
    document.getElementById('view-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).className = 'tab' + (t === tab ? ' active' : '');
  });

  if (tab === 'carts') loadPendingCarts();
  if (tab === 'payment') loadReadyOrders();

  // 스캔 탭 벗어나면 카메라 중지
  if (tab !== 'scan' && html5QrCode) {
    try { html5QrCode.stop(); } catch(e) {}
  }
}

function updateLastUpdate() {
  document.getElementById('lastUpdate').textContent =
    new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ── QR 스캐너 ─────────────────────────────────────────
function startScanner() {
  document.getElementById('scanBtn').style.display = 'none';
  document.getElementById('qrReader').style.display = 'block';

  html5QrCode = new Html5Qrcode('qrReader');
  html5QrCode.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 240 } },
    (sessionId) => {
      html5QrCode.stop().then(() => {
        document.getElementById('qrReader').style.display = 'none';
        document.getElementById('scanBtn').style.display = 'block';
        document.getElementById('scanBtn').textContent = 'QR 다시 스캔';
        loadCartBySession(sessionId);
      });
    },
    (error) => {}
  ).catch(err => {
    showToast('카메라 접근 실패');
    document.getElementById('scanBtn').style.display = 'block';
  });
}

async function loadCartBySession(sessionId) {
  const area = document.getElementById('previewArea');
  area.innerHTML = '<div class="empty-state">조회 중...</div>';

  try {
    const res = await api({ action: 'getOrder', sessionId });
    if (!res.items || res.items.length === 0) {
      area.innerHTML = '<div class="empty-state">찜 내역이 없습니다</div>';
      return;
    }
    renderPreview(res, sessionId);
  } catch(e) {
    area.innerHTML = '<div class="empty-state">조회 실패</div>';
  }
}

function renderPreview(data, sessionId) {
  const area = document.getElementById('previewArea');
  const statusMap = { '찜':'찜됨', '확정':'확정', '피킹완료':'피킹 완료', '결제완료':'결제 완료' };
  const isEditable = ['확정','피킹완료'].includes(data.status);
  const isPaid = data.status === '결제완료';

  let actionHtml;
  if (data.status === '찜' || !data.status) {
    actionHtml = `<button class="action-btn primary" data-action="confirm-session" data-session-id="${escapeHtml(sessionId)}">확정</button>`;
  } else if (isEditable) {
    actionHtml = `<button class="action-btn primary" data-action="open-edit" data-ticket="${escapeHtml(data.ticketNo)}">주문 수정</button>`;
  } else {
    actionHtml = `<button class="action-btn" disabled>${isPaid ? '결제 완료' : '처리됨'}</button>`;
  }

  area.innerHTML = `
    <div class="preview-card">
      <div class="preview-header">
        <div class="preview-ticket-num">${data.ticketNo ? 'No.' + escapeHtml(data.ticketNo) : '찜 확인'}</div>
        <div class="preview-status">${escapeHtml(statusMap[data.status] || '')}</div>
      </div>
      ${data.items.map(item => `
        <div class="preview-item">
          <div>
            <div class="preview-name">${escapeHtml(item.name)}</div>
            <div class="preview-sku">${escapeHtml(item.sku)} × ${item.qty || 1}</div>
          </div>
          <div class="preview-size">${escapeHtml(item.size)}</div>
        </div>`).join('')}
      <div class="action-row">
        ${actionHtml}
      </div>
    </div>`;
}

async function confirmBySession(sessionId, btn) {
  btn.disabled = true;
  btn.textContent = '처리 중...';
  try {
    const res = await api({ action: 'confirmOrder', sessionId });
    if (res.soldout) {
      const list = (res.items || []).map(i => `${i.name} ${i.size}`).join(', ');
      showToast(`품절: ${list}`);
      btn.disabled = false;
      btn.textContent = '확정';
      return;
    }
    if (res.success === false) {
      showToast(res.message || '확정 실패');
      btn.disabled = false;
      btn.textContent = '확정';
      return;
    }
    showToast('No.' + res.ticketNo + ' 확정 완료');
    document.getElementById('previewArea').innerHTML = '';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '확정';
    showToast('확정 실패');
  }
}

// ── 찜 목록 탭 ─────────────────────────────────────────
async function loadPendingCarts() {
  try {
    const res = await api({ action: 'getPendingCarts' });
    const carts = res.carts || [];
    const el = document.getElementById('cartList');

    if (carts.length === 0) {
      el.innerHTML = '<div class="empty-state">대기 중인 찜이 없습니다</div>';
      return;
    }

    el.innerHTML = carts.map(cart => `
      <div class="preview-card">
        <div class="preview-header">
          <div class="preview-ticket-num">찜 #${escapeHtml(cart.sessionId.slice(-4))}</div>
          <div class="preview-status">${cart.items.length}개 선택</div>
        </div>
        ${cart.items.map(item => `
          <div class="preview-item">
            <div>
              <div class="preview-name">${escapeHtml(item.name)}</div>
              <div class="preview-sku">${escapeHtml(item.sku)} × ${item.qty || 1}</div>
            </div>
            <div class="preview-size">${escapeHtml(item.size)}</div>
          </div>`).join('')}
        <div class="action-row">
          <button class="action-btn primary" data-action="confirm-session" data-session-id="${escapeHtml(cart.sessionId)}">확정</button>
        </div>
      </div>`).join('');
  } catch(e) {}
}

// ── 결제 대기 탭 ───────────────────────────────────────
async function loadReadyOrders() {
  try {
    const res = await api({ action: 'getReadyOrders' });
    const orders = res.orders || [];
    const el = document.getElementById('readyList');

    if (orders.length === 0) {
      el.innerHTML = '<div class="empty-state">결제 대기 주문이 없습니다</div>';
      return;
    }

    el.innerHTML = orders.map(order => `
      <div class="ready-card">
        <div class="ready-ticket-num">No.${escapeHtml(order.ticketNo)}</div>
        <div class="ready-items">
          ${order.items.map(item => `
            <div class="ready-item-row">
              <span class="ready-item-name">${escapeHtml(item.name)} × ${item.qty || 1}</span>
              <span class="ready-item-size">${escapeHtml(item.size)}</span>
            </div>`).join('')}
        </div>
        <button class="action-btn" data-action="open-edit" data-ticket="${escapeHtml(order.ticketNo)}" style="flex: 0 0 auto; padding: 14px 12px; line-height: 1.8; white-space: nowrap;">수정</button>
        <button class="pay-btn" data-action="complete-payment" data-ticket="${escapeHtml(order.ticketNo)}">결제<br>완료</button>
      </div>`).join('');
  } catch(e) {}
}

async function completePayment(ticketNo, btn) {
  btn.disabled = true;
  btn.textContent = '처리 중';
  try {
    await api({ action: 'completePayment', ticketNo });
    showToast('No.' + ticketNo + ' 결제 완료');
    loadReadyOrders();
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '결제<br>완료';
    showToast('처리 실패');
  }
}

// ── 주문 수정 모달 ─────────────────────────────────────
async function openEditModal(ticketNo) {
  if (!ticketNo) return;
  editingTicketNo = ticketNo;
  editItems = {};
  editAddPanelOpen = false;
  editingOldStatus = null;

  const modal = document.getElementById('editModal');
  document.getElementById('editTicketLabel').textContent = 'No.' + ticketNo;
  document.getElementById('editStatusPill').textContent = '— LOADING';
  document.getElementById('editStatusPill').className = 'edit-status-pill';
  document.getElementById('editItemsList').innerHTML =
    '<div class="edit-empty">Loading…</div>';
  document.getElementById('addGrid').classList.remove('open');
  document.getElementById('addToggleBtn').classList.remove('active');
  document.getElementById('addToggleBtn').textContent = '+ 항목 추가';
  modal.classList.add('open');

  try {
    const [orderRes, invRes] = await Promise.all([
      api({ action: 'getOrder', ticketNo }),
      api({ action: 'getInventory' })
    ]);

    if (!orderRes.items || orderRes.items.length === 0) {
      showToast('주문을 찾을 수 없습니다');
      closeEditModal();
      return;
    }

    editingOldStatus = orderRes.status;
    if (!['확정', '피킹완료'].includes(editingOldStatus)) {
      showToast(`'${editingOldStatus}' 상태는 수정 불가`);
      closeEditModal();
      return;
    }

    editInventory = invRes.items || [];

    // 가격 lookup용 inv map
    const priceMap = {};
    editInventory.forEach(it => {
      priceMap[it['SKU'] + '|' + it['사이즈']] = it['가격'] || 0;
    });

    // 기존 items를 SKU|size 단위로 집계 (서버 행이 1수량/행으로 저장된 경우 대응)
    orderRes.items.forEach(item => {
      const key = item.sku + '|' + item.size;
      if (editItems[key]) {
        editItems[key].qty += (item.qty || 1);
      } else {
        editItems[key] = {
          sku: item.sku, name: item.name, size: item.size,
          qty: item.qty || 1,
          price: priceMap[key] || 0
        };
      }
    });

    renderEditModal();
  } catch (e) {
    showToast('조회 실패');
    closeEditModal();
  }
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
  editingTicketNo = null;
  editingOldStatus = null;
  editItems = {};
  editInventory = [];
  editAddPanelOpen = false;
}

function renderEditModal() {
  // 상태 pill
  const pill = document.getElementById('editStatusPill');
  if (editingOldStatus === '피킹완료') {
    pill.className = 'edit-status-pill picking';
    pill.textContent = 'PICKING DONE';
  } else {
    pill.className = 'edit-status-pill';
    pill.textContent = 'CONFIRMED';
  }

  // 항목 리스트
  const list = document.getElementById('editItemsList');
  const items = Object.values(editItems);

  if (items.length === 0) {
    list.innerHTML = '<div class="edit-empty">항목이 없습니다 — 아래에서 추가하세요</div>';
  } else {
    list.innerHTML = items.map(i => {
      const key = i.sku + '|' + i.size;
      const keyAttr = escapeHtml(key);
      return `
        <div class="edit-item">
          <div class="edit-item-info">
            <div class="edit-item-name">${escapeHtml(i.name)}</div>
            <div class="edit-item-sub">${escapeHtml(i.sku)}${i.price ? ' · ₩' + i.price.toLocaleString('ko-KR') : ''}</div>
          </div>
          <div class="edit-item-size">${escapeHtml(i.size)}</div>
          <div class="edit-qty-ctrl">
            <button class="edit-qty-btn" data-action="edit-qty" data-key="${keyAttr}" data-delta="-1">−</button>
            <span class="edit-qty-num">${i.qty}</span>
            <button class="edit-qty-btn" data-action="edit-qty" data-key="${keyAttr}" data-delta="1">+</button>
          </div>
          <button class="edit-remove-btn" data-action="edit-remove" data-key="${keyAttr}" aria-label="제거">×</button>
        </div>`;
    }).join('');
  }

  // 추가 그리드
  renderAddGrid();

  // Save 버튼: 변경 없을 시에도 누를 수 있게 두되, 항목 0개면 disabled
  document.getElementById('editSaveBtn').disabled = items.length === 0;
}

function renderAddGrid() {
  const grid = document.getElementById('addGrid');
  if (!editAddPanelOpen) {
    grid.classList.remove('open');
    return;
  }
  grid.classList.add('open');

  // SKU 단위 그룹핑
  const grouped = {};
  editInventory.forEach(it => {
    const sku = it['SKU'];
    if (!grouped[sku]) {
      grouped[sku] = {
        sku,
        name: it['제품명'],
        price: it['가격'] || 0,
        imgUrl: it['이미지URL'] || '',
        sizes: []
      };
    }
    const avail = (it['초기수량'] || 0) - (it['예약수량'] || 0) - (it['판매수량'] || 0);
    grouped[sku].sizes.push({ size: it['사이즈'], avail });
  });

  const products = Object.values(grouped);
  if (products.length === 0) {
    grid.innerHTML = '<div class="edit-empty">재고 없음</div>';
    return;
  }

  grid.innerHTML = products.map(p => {
    const skuAttr = escapeHtml(p.sku);
    const nameAttr = escapeHtml(p.name);
    return `
      <div class="add-product">
        <div class="add-product-head">
          ${p.imgUrl
            ? `<img class="add-product-img" src="${escapeHtml(p.imgUrl)}" alt="${nameAttr}" loading="lazy">`
            : `<div class="add-product-img-placeholder"></div>`}
          <div class="add-product-meta">
            <div class="add-product-name">${escapeHtml(p.name)}</div>
            <div class="add-product-sub">${escapeHtml(p.sku)}${p.price ? ' · ₩' + p.price.toLocaleString('ko-KR') : ''}</div>
          </div>
        </div>
        <div class="add-size-row">
          ${p.sizes.map(s => {
            // 카트에 이미 잡힌 수량 만큼 가용량에서 추가 차감 (낙관적 표시)
            const reservedInEdit = editItems[p.sku + '|' + s.size]?.qty || 0;
            const remaining = s.avail - reservedInEdit;
            const sizeAttr = escapeHtml(s.size);
            const disabled = remaining <= 0;
            return `<button class="add-size-btn" ${disabled ? 'disabled' : ''}
              data-action="edit-add" data-sku="${skuAttr}" data-name="${nameAttr}"
              data-size="${sizeAttr}" data-price="${p.price}">
              ${escapeHtml(s.size)}<span class="add-size-avail">(${Math.max(0, remaining)})</span>
            </button>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

function editToggleAddPanel() {
  editAddPanelOpen = !editAddPanelOpen;
  const btn = document.getElementById('addToggleBtn');
  if (editAddPanelOpen) {
    btn.classList.add('active');
    btn.textContent = '✕ 닫기';
  } else {
    btn.classList.remove('active');
    btn.textContent = '+ 항목 추가';
  }
  renderAddGrid();
}

function editAdjustQty(key, delta) {
  const item = editItems[key];
  if (!item) return;

  if (delta > 0) {
    // 가용 재고 검사 (낙관적: 클라이언트에서 1차 가드, 서버에서 2차 검증)
    const inv = editInventory.find(i => i['SKU'] === item.sku && i['사이즈'] === item.size);
    if (inv) {
      const avail = (inv['초기수량'] || 0) - (inv['예약수량'] || 0) - (inv['판매수량'] || 0);
      // 현재 주문이 잡고 있던 분은 이미 예약수량에 포함됨 → 그 수량까지는 +가능
      // 즉, "남은 가용 + 내 기존 수량" 까지 가능
      // 단순화: 화면 가드는 avail+item.qty 기준으로 처리 (정확하진 않지만 1차 가드로 충분)
      // → 백엔드에서 어차피 SOLDOUT 검증
    }
    item.qty += 1;
  } else {
    item.qty -= 1;
    if (item.qty <= 0) delete editItems[key];
  }
  renderEditModal();
}

function editRemoveItem(key) {
  delete editItems[key];
  renderEditModal();
}

function editAddItem(sku, name, size, price) {
  const key = sku + '|' + size;
  if (editItems[key]) {
    editItems[key].qty += 1;
  } else {
    editItems[key] = { sku, name, size, qty: 1, price: Number(price) || 0 };
  }
  renderEditModal();
}

async function editSaveChanges() {
  const items = Object.values(editItems);
  if (items.length === 0) {
    showToast('항목이 없습니다');
    return;
  }

  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  // 서버로 보낼 때 qty 그대로 (백엔드는 행 단위가 아닌 집계 처리도 가능하지만,
  // 기존 confirmOrder 흐름과 일관되게 1수량/행으로 보낼 필요는 없음 — qty 필드 그대로 사용)
  const payload = items.map(i => ({ sku: i.sku, name: i.name, size: i.size, qty: i.qty }));

  try {
    const res = await api({
      action: 'updateOrder',
      ticketNo: editingTicketNo,
      items: payload
    });

    if (res.code === 'INVENTORY_SOLDOUT' || res.soldout) {
      const list = (res.items || []).map(i => `${i.name || i.sku} ${i.size}`).join(', ');
      showToast(`재고 부족: ${list}`);
      btn.disabled = false;
      btn.textContent = '변경 저장';
      return;
    }
    if (res.code === 'INVALID_STATUS') {
      showToast(res.message || '상태가 변경되어 수정 불가');
      closeEditModal();
      return;
    }
    if (res.success === false) {
      showToast(res.message || '저장 실패');
      btn.disabled = false;
      btn.textContent = '변경 저장';
      return;
    }

    // 성공
    if (res.revertedFromPicking) {
      showToast('No.' + editingTicketNo + ' 수정 완료 — 3F 재피킹');
    } else {
      showToast('No.' + editingTicketNo + ' 수정 완료');
    }
    closeEditModal();

    // 현재 탭에 따라 리프레시
    if (currentTab === 'payment') loadReadyOrders();
    if (currentTab === 'carts') loadPendingCarts();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '변경 저장';
    showToast('저장 실패');
  }
}

// ── 드롭 초기화 ───────────────────────────────────────
async function resetDrop() {
  if (!confirm('드롭 초기화를 실행할까요?\n이전 주문이 아카이브되고 번호/재고가 리셋됩니다.')) return;
  try {
    const res = await api({ action: 'resetDrop' });
    if (res.success) {
      showToast('초기화 완료');
    } else {
      showToast('초기화 실패');
    }
  } catch(e) {
    showToast('초기화 실패');
  }
}

// ── 유틸 ──────────────────────────────────────────────
async function api(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return res.json();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el || el.disabled) return;
  const { action, tab, sessionId, ticket, key, delta, sku, name, size, price } = el.dataset;
  switch (action) {
    case 'switch-tab': switchTab(tab); break;
    case 'reset-drop': resetDrop(); break;
    case 'start-scanner': startScanner(); break;
    case 'confirm-session': confirmBySession(sessionId, el); break;
    case 'complete-payment': completePayment(ticket, el); break;
    case 'open-edit': openEditModal(ticket); break;
    case 'edit-close': closeEditModal(); break;
    case 'edit-toggle-add': editToggleAddPanel(); break;
    case 'edit-qty': editAdjustQty(key, Number(delta)); break;
    case 'edit-remove': editRemoveItem(key); break;
    case 'edit-add': editAddItem(sku, name, size, price); break;
    case 'edit-save': editSaveChanges(); break;
  }
});
</script>

document.getElementById('logoImg').src = logoUrl;
document.getElementById('pinLogo').src = logoUrl;
