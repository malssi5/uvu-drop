<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UVU — 캐셔</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0f0a;
    --surface: #111711;
    --border: #1e2a1e;
    --accent: #e8e0d0;
    --muted: #3d4d3d;
    --text: #f0ece4;
    --green: #3fb950;
    --blue: #388bfd;
    --yellow: #d29922;
    --danger: #f85149;
    --mono: 'DM Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: var(--display);
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .cashier-badge { font-size: 11px; color: var(--green); letter-spacing: 2px; }
  .last-update   { font-size: 10px; color: var(--muted); }

  /* 탭 */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  /* 확정 탭 (직원 확정용) */
  .confirm-section {
    padding: 16px;
  }

  .confirm-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .ticket-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--display);
    font-size: 28px;
    letter-spacing: 4px;
    padding: 12px 16px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }

  .ticket-input:focus { border-color: var(--accent); }

  .confirm-btn {
    padding: 12px 20px;
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .confirm-btn:hover { opacity: 0.85; }
  .confirm-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* 미리보기 */
  .preview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 10px;
  }

  .preview-ticket {
    font-family: var(--display);
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .preview-item {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .preview-item:last-child { border-bottom: none; }
  .preview-name { color: var(--accent); }
  .preview-detail { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .preview-size {
    background: var(--border);
    padding: 3px 8px;
    font-size: 11px;
    align-self: center;
  }

  .modify-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .modify-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .modify-btn:hover { background: var(--yellow); color: var(--bg); }

  /* 결제 탭 */
  .payment-section {
    padding: 16px;
    flex: 1;
  }

  .ready-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .ready-ticket {
    font-family: var(--display);
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--accent);
    min-width: 80px;
  }

  .ready-items {
    flex: 1;
    font-size: 11px;
  }

  .ready-item-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }

  .ready-item-row:last-child { border-bottom: none; }

  .pay-btn {
    padding: 14px 18px;
    background: var(--green);
    border: none;
    color: var(--bg);
    font-family: var(--display);
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .pay-btn:hover { opacity: 0.85; }
  .pay-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
  }

  /* 수정 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 90%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
  }

  .modal-title {
    font-family: var(--display);
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
  }

  .close-modal { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; }

  .modal-item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .del-item-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    transition: color 0.15s;
  }

  .del-item-btn:hover { color: var(--danger); }

  .modal-save-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 3px;
    cursor: pointer;
  }

  /* 토스트 */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: var(--bg);
    padding: 10px 20px;
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header>
  <div class="logo">UVU</div>
  <div class="cashier-badge">CASHIER</div>
  <div class="last-update" id="lastUpdate">—</div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-confirm" onclick="switchTab('confirm')">확정</div>
  <div class="tab" id="tab-payment" onclick="switchTab('payment')">결제 대기</div>
</div>

<!-- 확정 탭 -->
<div id="view-confirm" class="confirm-section">
  <div class="confirm-input-row">
    <input type="number" class="ticket-input" id="ticketInput" placeholder="번호표" min="1" max="999"
      onkeydown="if(event.key==='Enter') previewOrder()">
    <button class="confirm-btn" onclick="previewOrder()">조회</button>
  </div>

  <div id="previewArea"></div>
</div>

<!-- 결제 탭 -->
<div id="view-payment" class="payment-section" style="display:none">
  <div id="readyList"><div class="empty-state">결제 대기 주문이 없습니다</div></div>
</div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="modifyModal">
  <div class="modal">
    <div class="modal-title">
      주문 수정
      <button class="close-modal" onclick="closeModal()">×</button>
    </div>
    <div id="modalItemList"></div>
    <button class="modal-save-btn" onclick="saveModify()">수정 저장</button>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbx8DAIb67nogTSaRoBQCWKqvfbLkIt8Y2kPpJ-qkXFiPHUQpH8pmR3VZP5JL57hwA/exec';

  let currentTab = 'confirm';
  let previewData = null;
  let modalItems = [];
  let modalTicketNo = null;

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('view-confirm').style.display = tab === 'confirm' ? 'block' : 'none';
    document.getElementById('view-payment').style.display = tab === 'payment' ? 'block' : 'none';
    document.getElementById('tab-confirm').className = 'tab' + (tab === 'confirm' ? ' active' : '');
    document.getElementById('tab-payment').className = 'tab' + (tab === 'payment' ? ' active' : '');
    if (tab === 'payment') loadReadyOrders();
  }

  // ── 주문 조회 및 확정 ────────────────────────────────────
  async function previewOrder() {
    const ticketNo = document.getElementById('ticketInput').value.trim();
    if (!ticketNo) return;

    const area = document.getElementById('previewArea');
    area.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:20px 0">조회 중...</div>';

    try {
      const res = await api({ action: 'getOrder', ticketNo });

      if (!res.items || res.items.length === 0) {
        area.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:20px 0">
          No.${ticketNo} — 찜 내역이 없습니다
        </div>`;
        return;
      }

      previewData = res;
      renderPreview(res);
    } catch(e) {
      area.innerHTML = '<div style="color:var(--danger);font-size:12px;padding:10px 0">조회 실패</div>';
    }
  }

  function renderPreview(data) {
    const area = document.getElementById('previewArea');
    const alreadyConfirmed = data.status === '확정' || data.status === '피킹완료' || data.status === '결제완료';

    area.innerHTML = `
      <div class="preview-card">
        <div class="preview-ticket">NO.${data.ticketNo}
          <span style="font-size:12px;color:var(--muted);margin-left:10px">${statusLabel(data.status)}</span>
        </div>
        ${data.items.map(item => `
          <div class="preview-item">
            <div>
              <div class="preview-name">${item.name}</div>
              <div class="preview-detail">${item.sku}</div>
            </div>
            <div class="preview-size">${item.size}</div>
          </div>
        `).join('')}
        ${!alreadyConfirmed ? `
          <div class="modify-row">
            <button class="modify-btn" onclick="openModify(${JSON.stringify(data).replace(/"/g,'&quot;')})">수정</button>
            <button class="modify-btn" style="border-color:var(--accent);color:var(--accent)"
              onclick="confirmOrder('${data.ticketNo}')">확정</button>
          </div>
        ` : `
          <div style="margin-top:12px">
            <button class="modify-btn" onclick="openModify(${JSON.stringify(data).replace(/"/g,'&quot;')})">주문 수정</button>
          </div>
        `}
      </div>
    `;
  }

  function statusLabel(s) {
    return { '찜':'찜됨', '확정':'확정', '피킹완료':'피킹완료', '결제완료':'결제완료' }[s] || '';
  }

  async function confirmOrder(ticketNo) {
    try {
      await api({ action: 'confirmOrder', ticketNo });
      showToast('No.' + ticketNo + ' 확정 완료');
      previewData.status = '확정';
      renderPreview(previewData);
    } catch(e) {
      showToast('확정 실패');
    }
  }

  // ── 수정 모달 ────────────────────────────────────────────
  function openModify(data) {
    modalTicketNo = data.ticketNo;
    modalItems = JSON.parse(JSON.stringify(data.items));
    renderModalItems();
    document.getElementById('modifyModal').classList.add('open');
  }

  function renderModalItems() {
    document.getElementById('modalItemList').innerHTML = modalItems.map((item, i) => `
      <div class="modal-item-row">
        <div>
          <div style="color:var(--accent);font-size:12px">${item.name}</div>
          <div style="color:var(--muted);font-size:10px">${item.sku} / ${item.size}</div>
        </div>
        <button class="del-item-btn" onclick="removeModalItem(${i})">×</button>
      </div>
    `).join('') || '<div style="color:var(--muted);font-size:12px;padding:10px 0">항목 없음</div>';
  }

  function removeModalItem(i) {
    modalItems.splice(i, 1);
    renderModalItems();
  }

  async function saveModify() {
    try {
      await api({ action: 'updateOrder', ticketNo: modalTicketNo, items: modalItems });
      showToast('수정 저장됨');
      closeModal();
      // 미리보기 갱신
      const res = await api({ action: 'getOrder', ticketNo: modalTicketNo });
      renderPreview(res);
    } catch(e) {
      showToast('저장 실패');
    }
  }

  function closeModal() {
    document.getElementById('modifyModal').classList.remove('open');
  }

  // ── 결제 대기 목록 ───────────────────────────────────────
  async function loadReadyOrders() {
    try {
      const res = await api({ action: 'getReadyOrders' });
      const orders = res.orders || [];
      const el = document.getElementById('readyList');

      if (orders.length === 0) {
        el.innerHTML = '<div class="empty-state">결제 대기 주문이 없습니다</div>';
        return;
      }

      el.innerHTML = orders.map(order => `
        <div class="ready-card">
          <div class="ready-ticket">NO.${order.ticketNo}</div>
          <div class="ready-items">
            ${order.items.map(item => `
              <div class="ready-item-row">
                <span style="color:var(--accent)">${item.name}</span>
                <span style="color:var(--muted)">${item.size}</span>
              </div>
            `).join('')}
          </div>
          <button class="pay-btn" onclick="completePayment('${order.ticketNo}', this)">
            결제<br>완료
          </button>
        </div>
      `).join('');

      document.getElementById('lastUpdate').textContent =
        '갱신 ' + new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch(e) {}
  }

  async function completePayment(ticketNo, btn) {
    btn.disabled = true;
    btn.textContent = '처리 중';
    try {
      await api({ action: 'completePayment', ticketNo });
      showToast('No.' + ticketNo + ' 결제 완료');
      loadReadyOrders();
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '결제\n완료';
      showToast('처리 실패');
    }
  }

  // ── 유틸 ────────────────────────────────────────────────
  async function api(body) {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(body) });
    return res.json();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // 결제탭 자동 갱신
  setInterval(() => {
    if (currentTab === 'payment') loadReadyOrders();
  }, 6000);
</script>
</body>
</html>
